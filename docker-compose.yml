services:
  postgres:
    image: postgres:16-alpine
    container_name: cafe_employee_db
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cafe_employee_backend
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: cafe_employee_frontend
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  postgres_data:
